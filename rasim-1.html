<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>هيا الى الرسم 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --ink: #0a0a0f;
    --neon: #ff3e6c;
    --volt: #aaff00;
    --sky: #00d4ff;
    --purple: #9b5de5;
    --orange: #ff9f1c;
    --bar: 64px;
  }

  body {
    background: var(--ink);
    font-family: 'Cairo', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #fff;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: var(--bar);
    background: #13131a;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    padding: 0 .8rem;
    gap: .5rem;
    flex-shrink: 0;
    z-index: 10;
  }

  .app-title {
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--neon);
    flex: 1;
  }

  .top-btn {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    padding: .4rem .7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: .3rem;
    transition: background .2s;
  }
  .top-btn:active { background: rgba(255,255,255,.15); }
  .top-btn.danger { color: var(--neon); border-color: rgba(255,62,108,.3); }
  .top-btn.save   { color: var(--volt); border-color: rgba(170,255,0,.3); }

  /* ── CANVAS AREA ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    touch-action: none;
  }

  canvas {
    position: absolute;
    inset: 0;
    cursor: crosshair;
    touch-action: none;
  }

  /* cursor preview */
  #cursor-preview {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    border: 2px solid rgba(255,255,255,.6);
    transform: translate(-50%,-50%);
    transition: width .1s, height .1s;
    z-index: 5;
    display: none;
  }

  /* ── BOTTOM TOOLBAR ── */
  .toolbar {
    background: #13131a;
    border-top: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
    z-index: 10;
  }

  /* tools row */
  .tools-row {
    display: flex;
    align-items: center;
    padding: .5rem .6rem;
    gap: .4rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tools-row::-webkit-scrollbar { display:none; }

  .tool-btn {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.05);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    transition: all .15s;
    position: relative;
  }
  .tool-btn:active { transform: scale(.92); }
  .tool-btn.active {
    background: var(--neon);
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(255,62,108,.4);
    color: #fff;
  }
  .tool-btn.active-sky  { background: var(--sky);    border-color: var(--sky);    box-shadow: 0 0 16px rgba(0,212,255,.4); }
  .tool-btn.active-volt { background: var(--volt);   border-color: var(--volt);   box-shadow: 0 0 16px rgba(170,255,0,.4); color:#000; }
  .tool-btn.active-purple { background: var(--purple); border-color: var(--purple); box-shadow: 0 0 16px rgba(155,93,229,.4); }

  .sep { width:1px; height:32px; background:rgba(255,255,255,.08); flex-shrink:0; margin:0 .2rem; }

  /* size row */
  .size-row {
    display: flex;
    align-items: center;
    padding: .3rem .8rem .6rem;
    gap: .6rem;
  }

  .size-label { font-size: .72rem; color: rgba(255,255,255,.4); white-space:nowrap; }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 99px;
    background: rgba(255,255,255,.15);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px rgba(255,62,108,.5);
    cursor: pointer;
  }

  .size-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }

  /* color palette */
  .palette-row {
    display: flex;
    align-items: center;
    padding: 0 .6rem .7rem;
    gap: .45rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .palette-row::-webkit-scrollbar { display:none; }

  .color-swatch {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: transform .15s, border-color .15s;
  }
  .color-swatch:active { transform: scale(.85); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

  input[type=color] {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.2);
    background: none;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }

  /* ── PANELS (opacity, layers) ── */
  .panel {
    position: fixed;
    bottom: calc(var(--bar) * 2.8);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    z-index: 20;
    min-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    display: none;
  }
  .panel.open { display: block; }
  .panel h4 { font-size: .85rem; color: rgba(255,255,255,.5); margin-bottom: .8rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: #1a1a24;
    border: 1px solid rgba(170,255,0,.3);
    color: var(--volt);
    font-size: .85rem;
    font-weight: 700;
    padding: .6rem 1.4rem;
    border-radius: 999px;
    opacity: 0;
    transition: all .3s;
    z-index: 99;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── CHALLENGE POPUP ── */
  .challenge-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .challenge-overlay.open { display:flex; }

  .challenge-box {
    background: #13131a;
    border: 2px solid var(--neon);
    border-radius: 24px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .challenge-box h2 { font-size: 1.4rem; margin-bottom: .5rem; color: var(--neon); }
  .challenge-box .topic { font-size: 2rem; font-weight: 900; margin: 1rem 0; }
  .challenge-box .timer-display {
    font-size: 3rem;
    font-weight: 900;
    color: var(--volt);
    font-variant-numeric: tabular-nums;
    margin: .5rem 0 1.5rem;
  }
  .challenge-box .timer-display.urgent { color: var(--neon); animation: blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  .ch-btn {
    width: 100%;
    padding: .9rem;
    border-radius: 12px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: .5rem;
  }
  .ch-btn.start { background: var(--neon); color: #fff; }
  .ch-btn.cancel { background: rgba(255,255,255,.07); color: rgba(255,255,255,.6); }

  /* ── UNDO INDICATOR ── */
  .undo-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 3rem;
    opacity: 0;
    pointer-events: none;
    z-index: 99;
    transition: opacity .2s;
  }
  .undo-flash.show { opacity: 1; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="app-title">🎨 هيا الى الرسم</span>
  <button class="top-btn" onclick="undoLast()">↩ تراجع</button>
  <button class="top-btn" onclick="openChallenge()">⚡ تحدي</button>
  <button class="top-btn save" onclick="saveImage()">💾 حفظ</button>
  <button class="top-btn danger" onclick="clearCanvas()">🗑</button>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="mainCanvas"></canvas>
  <div id="cursor-preview"></div>
</div>

<!-- BOTTOM TOOLBAR -->
<div class="toolbar">

  <!-- tools row -->
  <div class="tools-row">
    <!-- Draw tools -->
    <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')" title="قلم">✏️</button>
    <button class="tool-btn" id="btn-brush" onclick="setTool('brush')" title="فرشاة">🖌️</button>
    <button class="tool-btn" id="btn-spray" onclick="setTool('spray')" title="رش">💨</button>
    <button class="tool-btn" id="btn-fill" onclick="setTool('fill')" title="تعبئة">🪣</button>

    <div class="sep"></div>

    <!-- Shapes -->
    <button class="tool-btn" id="btn-line" onclick="setTool('line')" title="خط">╱</button>
    <button class="tool-btn" id="btn-rect" onclick="setTool('rect')" title="مستطيل">▭</button>
    <button class="tool-btn" id="btn-circle" onclick="setTool('circle')" title="دائرة">○</button>

    <div class="sep"></div>

    <!-- Eraser & eyedropper -->
    <button class="tool-btn active-sky" id="btn-eraser" onclick="setTool('eraser')" title="ممحاة">🧹</button>
    <button class="tool-btn" id="btn-eye" onclick="setTool('eyedropper')" title="قطارة">💉</button>

    <div class="sep"></div>

    <!-- Opacity -->
    <button class="tool-btn" onclick="togglePanel('opacity-panel')" title="شفافية">◑</button>
    <!-- Symmetry -->
    <button class="tool-btn" id="btn-sym" onclick="toggleSymmetry()" title="تناسق">⟺</button>
  </div>

  <!-- size row -->
  <div class="size-row">
    <span class="size-label">الحجم</span>
    <input type="range" id="sizeSlider" min="1" max="80" value="8" oninput="updateSize(this.value)">
    <div class="size-dot" id="sizeDot">
      <div id="sizeBall" style="width:8px;height:8px;border-radius:50%;background:#fff"></div>
    </div>
  </div>

  <!-- color palette -->
  <div class="palette-row" id="palette">
    <input type="color" id="colorPicker" value="#ffffff" oninput="pickColor(this.value)" title="اختر لون">
  </div>

</div>

<!-- OPACITY PANEL -->
<div class="panel" id="opacity-panel">
  <h4>الشفافية</h4>
  <input type="range" min="1" max="100" value="100" id="opacitySlider" oninput="updateOpacity(this.value)" style="width:100%">
  <div style="text-align:center;margin-top:.5rem;font-size:.85rem;color:var(--volt)" id="opacityVal">100%</div>
</div>

<!-- CHALLENGE OVERLAY -->
<div class="challenge-overlay" id="challengeOverlay">
  <div class="challenge-box">
    <h2>⚡ تحدي السرعة</h2>
    <p style="color:rgba(255,255,255,.5);font-size:.9rem">ارسم الموضوع قبل انتهاء الوقت!</p>
    <div class="topic" id="challengeTopic">🌊 موجة</div>
    <div class="timer-display" id="timerDisplay">60</div>
    <button class="ch-btn start" onclick="startChallenge()">🚀 ابدأ التحدي</button>
    <button class="ch-btn cancel" onclick="closeChallenge()">إلغاء</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<div class="undo-flash" id="undoFlash">↩</div>

<script>
// ── STATE ──
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

let tool = 'pen';
let color = '#ffffff';
let size = 8;
let opacity = 1;
let drawing = false;
let symmetry = false;
let lastX = 0, lastY = 0;
let startX = 0, startY = 0;
let history = [];
let MAX_HISTORY = 20;
let shapeSnapshot = null;
let sprayInterval = null;
let challengeTimer = null;
let challengeActive = false;
let challengeSeconds = 60;

// ── COLORS ──
const COLORS = [
  '#ffffff','#000000','#ff3e6c','#aaff00','#00d4ff',
  '#9b5de5','#ff9f1c','#ff6b6b','#4ecdc4','#45b7d1',
  '#f9ca24','#6ab04c','#e55039','#2980b9','#8e44ad',
  '#1abc9c','#e67e22','#95a5a6','#2c3e50','#f39c12'
];

const TOPICS = [
  '🌊 موجة','🦋 فراشة','🌙 قمر','🏙️ مدينة','🐉 تنين',
  '🌸 زهرة','🦁 أسد','🚀 صاروخ','🌋 بركان','🐠 سمكة',
  '🗻 جبل','🌈 قوس قزح','🦅 نسر','🏰 قلعة','🌺 وردة'
];

// ── INIT ──
function resizeCanvas() {
  const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  ctx.putImageData(snapshot, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function buildPalette() {
  const row = document.getElementById('palette');
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === color ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => selectColor(c);
    row.appendChild(s);
  });
}

resizeCanvas();
buildPalette();
window.addEventListener('resize', resizeCanvas);
saveHistory();

// ── TOOLS ──
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.remove('active','active-sky','active-volt','active-purple');
  });
  const map = {
    pen:'active', brush:'active', spray:'active', fill:'active',
    line:'active', rect:'active', circle:'active',
    eraser:'active-sky', eyedropper:'active-volt'
  };
  const el = document.getElementById('btn-' + t);
  if (el) el.classList.add(map[t] || 'active');
}

function toggleSymmetry() {
  symmetry = !symmetry;
  const b = document.getElementById('btn-sym');
  b.classList.toggle('active', symmetry);
  showToast(symmetry ? '⟺ التناسق مفعّل' : '⟺ التناسق مغلق');
}

// ── DRAW ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function applyCtxStyle(isEraser) {
  if (isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    const hex = color;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    ctx.strokeStyle = `rgba(${r},${g},${b},${opacity})`;
    ctx.fillStyle   = `rgba(${r},${g},${b},${opacity})`;
  }
  ctx.lineWidth = size;
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';
}

function drawStroke(x, y) {
  applyCtxStyle(tool === 'eraser');

  if (tool === 'brush') {
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = size * 2.5;
  } else {
    ctx.globalAlpha = 1;
  }

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();

  if (symmetry) {
    ctx.beginPath();
    ctx.moveTo(canvas.width - lastX, lastY);
    ctx.lineTo(canvas.width - x, y);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

function doSpray(x, y) {
  applyCtxStyle(false);
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * size * 1.5;
    ctx.beginPath();
    ctx.arc(x + Math.cos(angle)*r, y + Math.sin(angle)*r, 1.2, 0, Math.PI*2);
    ctx.fill();
    if (symmetry) {
      ctx.beginPath();
      ctx.arc((canvas.width-x) + Math.cos(angle)*r, y + Math.sin(angle)*r, 1.2, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawShape(x, y) {
  if (!shapeSnapshot) return;
  ctx.putImageData(shapeSnapshot, 0, 0);
  applyCtxStyle(false);
  ctx.globalAlpha = opacity;
  ctx.beginPath();

  if (tool === 'line') {
    ctx.moveTo(startX, startY);
    ctx.lineTo(x, y);
    ctx.stroke();
  } else if (tool === 'rect') {
    ctx.strokeRect(startX, startY, x-startX, y-startY);
  } else if (tool === 'circle') {
    const rx = Math.abs(x-startX)/2;
    const ry = Math.abs(y-startY)/2;
    const cx = startX + (x-startX)/2;
    const cy = startY + (y-startY)/2;
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function floodFill(x, y) {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;
  const idx = (Math.floor(y)*canvas.width + Math.floor(x)) * 4;
  const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];
  const hex = color;
  const fr = parseInt(hex.slice(1,3),16);
  const fg = parseInt(hex.slice(3,5),16);
  const fb = parseInt(hex.slice(5,7),16);
  const fa = Math.round(opacity * 255);
  if (tr===fr && tg===fg && tb===fb && ta===fa) return;

  const stack = [[Math.floor(x), Math.floor(y)]];
  const visited = new Uint8Array(canvas.width * canvas.height);

  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx<0||cy<0||cx>=canvas.width||cy>=canvas.height) continue;
    const i = cy*canvas.width+cx;
    if (visited[i]) continue;
    visited[i] = 1;
    const p = i*4;
    if (Math.abs(data[p]-tr)>30||Math.abs(data[p+1]-tg)>30||Math.abs(data[p+2]-tb)>30||Math.abs(data[p+3]-ta)>30) continue;
    data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=fa;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData, 0, 0);
}

function eyedrop(x, y) {
  const p = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
  const hex = '#' + [p[0],p[1],p[2]].map(v => v.toString(16).padStart(2,'0')).join('');
  selectColor(hex);
  setTool('pen');
  showToast('🎨 تم اختيار اللون');
}

// ── EVENTS ──
function onStart(e) {
  e.preventDefault();
  drawing = true;
  const {x, y} = getPos(e);
  lastX = x; lastY = y;
  startX = x; startY = y;

  if (tool === 'fill') { floodFill(x,y); saveHistory(); drawing=false; return; }
  if (tool === 'eyedropper') { eyedrop(x,y); drawing=false; return; }
  if (['line','rect','circle'].includes(tool)) { shapeSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); return; }
  if (tool === 'spray') { doSpray(x,y); sprayInterval = setInterval(()=>doSpray(lastX,lastY),30); return; }

  applyCtxStyle(tool==='eraser');
  ctx.beginPath();
  ctx.arc(x, y, size/2, 0, Math.PI*2);
  ctx.fill();
}

function onMove(e) {
  e.preventDefault();
  const {x, y} = getPos(e);

  // cursor preview
  const cp = document.getElementById('cursor-preview');
  cp.style.display = 'block';
  cp.style.left = x+'px';
  cp.style.top  = y+'px';
  cp.style.width = size+'px';
  cp.style.height= size+'px';

  if (!drawing) { lastX=x; lastY=y; return; }

  if (['line','rect','circle'].includes(tool)) { drawShape(x,y); return; }
  if (tool === 'spray') { lastX=x; lastY=y; return; }
  drawStroke(x, y);
  lastX=x; lastY=y;
}

function onEnd(e) {
  if (!drawing) return;
  drawing = false;
  if (sprayInterval) { clearInterval(sprayInterval); sprayInterval=null; }
  shapeSnapshot = null;
  saveHistory();
}

canvas.addEventListener('mousedown',  onStart, {passive:false});
canvas.addEventListener('mousemove',  onMove,  {passive:false});
canvas.addEventListener('mouseup',    onEnd);
canvas.addEventListener('mouseleave', ()=>{ document.getElementById('cursor-preview').style.display='none'; });
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove',  onMove,  {passive:false});
canvas.addEventListener('touchend',   onEnd);

// ── HISTORY ──
function saveHistory() {
  history.push(canvas.toDataURL());
  if (history.length > MAX_HISTORY) history.shift();
}

function undoLast() {
  if (history.length <= 1) { showToast('لا يوجد شيء للتراجع عنه'); return; }
  history.pop();
  const img = new Image();
  img.src = history[history.length-1];
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  const flash = document.getElementById('undoFlash');
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'), 400);
}

function clearCanvas() {
  if (!confirm('امسح كل شي؟')) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  saveHistory();
  showToast('🗑 تم المسح');
}

// ── COLORS ──
function selectColor(c) {
  color = c;
  document.getElementById('colorPicker').value = c;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('selected', s.style.background === c || rgbToHex(s.style.background) === c);
  });
  if (tool === 'eraser') setTool('pen');
}

function pickColor(c) {
  selectColor(c);
}

function rgbToHex(rgb) {
  if (!rgb || !rgb.startsWith('rgb')) return rgb;
  const parts = rgb.match(/\d+/g);
  if (!parts) return rgb;
  return '#' + parts.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}

// ── SIZE ──
function updateSize(v) {
  size = parseInt(v);
  const ball = document.getElementById('sizeBall');
  const s = Math.max(4, Math.min(28, size * .5));
  ball.style.width  = s+'px';
  ball.style.height = s+'px';
}

// ── OPACITY ──
function updateOpacity(v) {
  opacity = v/100;
  document.getElementById('opacityVal').textContent = v+'%';
}

// ── PANELS ──
function togglePanel(id) {
  const p = document.getElementById(id);
  p.classList.toggle('open');
}

// ── SAVE ──
function saveImage() {
  const link = document.createElement('a');
  link.download = 'رسمتي-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('✅ تم حفظ الرسمة!');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── CHALLENGE ──
const challengeTopics = TOPICS;
let challengeIdx = 0;

function openChallenge() {
  challengeIdx = Math.floor(Math.random() * challengeTopics.length);
  document.getElementById('challengeTopic').textContent = challengeTopics[challengeIdx];
  challengeSeconds = 60;
  document.getElementById('timerDisplay').textContent = '60';
  document.getElementById('timerDisplay').classList.remove('urgent');
  document.getElementById('challengeOverlay').classList.add('open');
}

function closeChallenge() {
  clearInterval(challengeTimer);
  challengeActive = false;
  document.getElementById('challengeOverlay').classList.remove('open');
}

function startChallenge() {
  clearCanvas();
  document.getElementById('challengeOverlay').classList.remove('open');
  challengeActive = true;
  challengeSeconds = 60;
  showToast('⚡ يلا ارسم: ' + challengeTopics[challengeIdx]);

  challengeTimer = setInterval(() => {
    challengeSeconds--;
    // show floating timer
    if (challengeActive) {
      const remaining = challengeSeconds;
      if (remaining <= 0) {
        clearInterval(challengeTimer);
        challengeActive = false;
        showToast('⏰ انتهى الوقت! عرض رسمتك 🎉');
        return;
      }
      if (remaining <= 10) showToast('⏱ ' + remaining + ' ثواني!');
    }
  }, 1000);
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'z') undoLast();
  if (e.key === 'p') setTool('pen');
  if (e.key === 'b') setTool('brush');
  if (e.key === 'e') setTool('eraser');
  if (e.key === 'f') setTool('fill');
});

setTool('pen');
showToast('🎨 هيا نرسم!');
</script>
