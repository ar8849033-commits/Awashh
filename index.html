<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>هيا الى الرسم – تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --ink: #0a0a0f;
    --neon: #ff3e6c;
    --volt: #aaff00;
    --sky: #00d4ff;
    --purple: #9b5de5;
  }

  body {
    background: var(--ink);
    font-family: 'Cairo', sans-serif;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,62,108,.12), transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 70%, rgba(155,93,229,.12), transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 10%, rgba(0,212,255,.07), transparent 60%);
    animation: breathe 6s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    from { opacity:.6; }
    to   { opacity:1; }
  }

  /* floating strokes */
  .stroke {
    position: fixed;
    border-radius: 999px;
    opacity: .1;
    animation: float 10s ease-in-out infinite;
    pointer-events: none;
  }
  .s1 { width:200px;height:4px;background:var(--neon);top:15%;left:-50px;transform:rotate(-10deg);animation-delay:0s; }
  .s2 { width:140px;height:3px;background:var(--sky);bottom:20%;right:-30px;transform:rotate(8deg);animation-delay:-3s; }
  .s3 { width:80px;height:80px;border:2px solid var(--purple);border-radius:50%;top:60%;left:10%;animation-delay:-5s; }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-18px); }
  }

  /* ── CARD ── */
  .card {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: #13131a;
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 28px;
    padding: 2.5rem 2rem;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    animation: slideUp .6s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* logo */
  .logo-wrap {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--neon), var(--purple));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 8px 32px rgba(255,62,108,.3);
  }
  .logo-title {
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fff, rgba(255,255,255,.6));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: .85rem;
    color: rgba(255,255,255,.35);
    margin-top: .3rem;
  }

  /* ── GOOGLE BTN ── */
  .google-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .8rem;
    padding: .95rem 1.2rem;
    background: #fff;
    color: #1f1f1f;
    border: none;
    border-radius: 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .15s;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    margin-bottom: 1rem;
  }
  .google-btn:active {
    transform: scale(.97);
    box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }
  .google-btn:hover { background: #f5f5f5; }

  .google-logo {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }

  /* divider */
  .divider {
    display: flex;
    align-items: center;
    gap: .8rem;
    margin: 1.2rem 0;
  }
  .divider-line { flex:1; height:1px; background:rgba(255,255,255,.08); }
  .divider-text { font-size: .78rem; color: rgba(255,255,255,.25); }

  /* ── EMAIL FORM ── */
  .input-wrap { margin-bottom: .9rem; }
  .input-label {
    font-size: .8rem;
    font-weight: 700;
    color: rgba(255,255,255,.5);
    margin-bottom: .4rem;
    display: block;
  }
  .input-field {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: .85rem 1rem;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-field::placeholder { color: rgba(255,255,255,.2); }
  .input-field:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(155,93,229,.15);
  }

  .submit-btn {
    width: 100%;
    padding: .95rem;
    background: linear-gradient(135deg, var(--neon), var(--purple));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(255,62,108,.3);
    margin-top: .3rem;
  }
  .submit-btn:active { transform: scale(.97); }

  /* forgot */
  .forgot {
    text-align: center;
    margin-top: .8rem;
    font-size: .8rem;
    color: rgba(255,255,255,.3);
    cursor: pointer;
    transition: color .2s;
  }
  .forgot:hover { color: var(--sky); }

  /* toggle */
  .toggle-wrap {
    text-align: center;
    margin-top: 1.4rem;
    font-size: .85rem;
    color: rgba(255,255,255,.35);
  }
  .toggle-link {
    color: var(--neon);
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }

  /* terms */
  .terms {
    text-align: center;
    font-size: .72rem;
    color: rgba(255,255,255,.2);
    margin-top: 1.5rem;
    line-height: 1.6;
  }
  .terms a { color: rgba(255,255,255,.4); text-decoration: none; }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,.9);
    z-index: 99;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--neon);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: .9rem; color: rgba(255,255,255,.5); }

  /* ── SUCCESS ── */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
    padding: 2rem;
  }
  .success-overlay.show { display: flex; }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--volt), #5cb800);
    display: flex; align-items:center; justify-content:center;
    font-size: 2.5rem;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow: 0 0 40px rgba(170,255,0,.3);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity:0; }
    to   { transform: scale(1); opacity:1; }
  }
  .success-title { font-size: 1.6rem; font-weight: 900; }
  .success-sub { color: rgba(255,255,255,.4); font-size: .9rem; }
  .go-btn {
    margin-top: 1rem;
    background: var(--neon);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: .9rem 2.5rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,62,108,.3);
    animation: fadeIn .5s .4s both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="stroke s1"></div>
<div class="stroke s2"></div>
<div class="stroke s3"></div>

<!-- CARD -->
<div class="card">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-icon">🎨</div>
    <div class="logo-title">هيا الى الرسم</div>
    <div class="logo-sub" id="cardSubtitle">سجّل دخولك وابدأ الإبداع</div>
  </div>

  <!-- GOOGLE BTN -->
  <button class="google-btn" onclick="loginWithGoogle()">
    <svg class="google-logo" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    متابعة مع Google
  </button>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">أو بالبريد الإلكتروني</div>
    <div class="divider-line"></div>
  </div>

  <!-- EMAIL FORM -->
  <div id="loginForm">
    <div class="input-wrap">
      <label class="input-label">البريد الإلكتروني</label>
      <input class="input-field" type="email" placeholder="example@email.com" id="emailInput" autocomplete="email">
    </div>
    <div class="input-wrap" id="passWrap">
      <label class="input-label">كلمة المرور</label>
      <input class="input-field" type="password" placeholder="••••••••" id="passInput" autocomplete="current-password">
    </div>
    <div class="input-wrap" id="confirmWrap" style="display:none">
      <label class="input-label">تأكيد كلمة المرور</label>
      <input class="input-field" type="password" placeholder="••••••••" id="confirmInput">
    </div>
    <div class="input-wrap" id="nameWrap" style="display:none">
      <label class="input-label">اسمك في التطبيق</label>
      <input class="input-field" type="text" placeholder="الفنان الكبير 🎨" id="nameInput">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">تسجيل الدخول</button>
    <div class="forgot" id="forgotBtn" onclick="forgotPass()">نسيت كلمة المرور؟</div>
  </div>

  <!-- TOGGLE LOGIN/REGISTER -->
  <div class="toggle-wrap" id="toggleWrap">
    ما عندك حساب؟
    <span class="toggle-link" id="toggleLink" onclick="toggleMode()">إنشاء حساب جديد</span>
  </div>

  <!-- TERMS -->
  <div class="terms">
    بالتسجيل توافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a>
  </div>

</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">جاري تسجيل الدخول...</div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✓</div>
  <div class="success-title">أهلاً بك! 🎉</div>
  <div class="success-sub" id="successName">جاهز تبدأ ترسم؟</div>
  <button class="go-btn" onclick="goToApp()">يلا نرسم! 🎨</button>
</div>

<script>
let isRegister = false;

function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('confirmWrap').style.display = isRegister ? 'block' : 'none';
  document.getElementById('nameWrap').style.display    = isRegister ? 'block' : 'none';
  document.getElementById('forgotBtn').style.display   = isRegister ? 'none'  : 'block';
  document.getElementById('submitBtn').textContent     = isRegister ? 'إنشاء الحساب' : 'تسجيل الدخول';
  document.getElementById('toggleLink').textContent    = isRegister ? 'لدي حساب بالفعل' : 'إنشاء حساب جديد';
  document.getElementById('toggleWrap').innerHTML      = isRegister
    ? 'لديك حساب؟ <span class="toggle-link" onclick="toggleMode()">تسجيل الدخول</span>'
    : 'ما عندك حساب؟ <span class="toggle-link" onclick="toggleMode()">إنشاء حساب جديد</span>';
  document.getElementById('cardSubtitle').textContent  = isRegister ? 'أنشئ حسابك وابدأ رحلتك' : 'سجّل دخولك وابدأ الإبداع';
}

function submitForm() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;

  if (!email || !email.includes('@')) {
    shake('emailInput'); return;
  }
  if (pass.length < 6) {
    shake('passInput'); return;
  }
  if (isRegister) {
    const confirm = document.getElementById('confirmInput').value;
    if (pass !== confirm) { shake('confirmInput'); return; }
  }

  const name = isRegister ? (document.getElementById('nameInput').value || 'الفنان') : 'مرحباً';
  showLoading(isRegister ? 'جاري إنشاء حسابك...' : 'جاري تسجيل الدخول...');

  setTimeout(() => {
    hideLoading();
    showSuccess(name);
  }, 1800);
}

function loginWithGoogle() {
  showLoading('جاري الاتصال بـ Google...');
  setTimeout(() => {
    hideLoading();
    showSuccess('مستخدم Google');
  }, 2000);
}

function forgotPass() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    alert('أدخل بريدك الإلكتروني أولاً');
    return;
  }
  showLoading('جاري إرسال رابط الاستعادة...');
  setTimeout(() => {
    hideLoading();
    alert('✅ تم إرسال رابط استعادة كلمة المرور لـ ' + email);
  }, 1500);
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#ff3e6c';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake .4s ease';
  setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 800);
}

function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showSuccess(name) {
  document.getElementById('successName').textContent = 'يلا ' + name + '، جاهز تبدأ ترسم؟';
  document.getElementById('successOverlay').classList.add('show');
}
function goToApp() {
  window.location.href = 'rasim.html';
}

// shake animation
const style = document.createElement('style');
style.textContent = `@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}`;
document.head.appendChild(style);

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitForm();
});
</script>
</body>
</html>
